name: Rebase dependabot PRs

on:
  push:
  workflow_dispatch:

jobs:
  rebase:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Rebase open dependabot PRs onto master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get all open dependabot PR branches
          BRANCHES=$(gh pr list --author "app/dependabot" --state open --json headRefName -q '.[].headRefName')

          for BRANCH in $BRANCHES; do
            echo "Rebasing $BRANCH onto master..."
            git checkout "$BRANCH" || { echo "Failed to checkout $BRANCH, skipping"; continue; }
            git merge origin/master --no-edit || true

            # Regenerate lock file to resolve any pnpm-lock.yaml conflicts
            git checkout --theirs pnpm-lock.yaml 2>/dev/null || true
            pnpm install --no-frozen-lockfile
            git add pnpm-lock.yaml package.json

            if ! git diff --cached --quiet; then
              git commit -m "chore: merge master and regenerate pnpm-lock.yaml"
              git push origin "$BRANCH"
              echo "Pushed $BRANCH"
            else
              echo "$BRANCH already up to date"
            fi
          done
